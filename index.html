}
function setRegime(regime) {
  const b = getBien(); if (!b) return;
  b.data.fiscal.regime = regime; save(); renderFiscal(b);
}

// ═══════════════════════════════════════════
// DECISION
// ═══════════════════════════════════════════
function renderDecision(b) {
  const d = b.data;
  const prix = d.acq.prixAchat || 0;
  const c = calcBien(b);

  // Scénarios
  const scen = (type) => {
    const loc = d.loc;
    const ov = type === 'pessimiste'
      ? {loyer: loc.loyerBas || Math.round((loc.loyer||0)*.85), tauxOcc: loc.occBas||80}
      : type === 'optimiste'
      ? {loyer: loc.loyerHaut || Math.round((loc.loyer||0)*1.1), tauxOcc: loc.occHaut||98}
      : {loyer: loc.loyer||0, tauxOcc: loc.tauxOcc||92};
    return calcBien(b, ov);
  };
  const cs = S.selectedScenario || 'realiste';
  const scPess = scen('pessimiste'), scReal = scen('realiste'), scOpti = scen('optimiste');
  const scActive = {pessimiste:scPess, realiste:scReal, optimiste:scOpti}[cs];

  // Break-even
  const loyerMinBreak = c.mensualite + (c.chargesTotal / 12);
  const occBreak = c.loyerMensuel > 0 ? Math.min(100, (loyerMinBreak / c.loyerMensuel) * 100) : 0;
  const apportRecup = c.apport > 0 && c.cashflowNetNet > 0 ? fmtD(c.apport / (c.cashflowNetNet * 12), 1) + ' ans' : c.apport > 0 ? '∞ (CF négatif)' : 'N/A';

  // Prix cible
  const prixCibleFn = (rendCible) => {
    const loyer = d.loc.loyer || 0;
    const tauxOcc = (d.loc.tauxOcc||92)/100;
    const loyerAn = loyer * 12 * tauxOcc;
    const chargesAn = (d.loc.taxeFonciere||0) + (d.loc.pno||0) + (d.loc.copro||0)*12;
    const revenus = loyerAn - chargesAn;
    return revenus / (rendCible/100);
  };

  document.getElementById('mainContent').innerHTML = `
  <div class="pf-box">
    <div class="fs-title" style="border:none;padding:0;margin-bottom:14px">🎯 Prix d'achat cible</div>
    <div class="fg fg2">
      <div class="fgrp"><label>Rendement net cible (%)</label><input type="number" step="0.5" id="rendCible" value="6" oninput="recalcPrixCible()"></div>
      <div class="fgrp"><label>Cash-flow mensuel cible (€)</label><input type="number" id="cfCible" value="0" oninput="recalcPrixCible()"></div>
    </div>
    <div id="prixCibleResult" style="margin-top:14px"></div>
  </div>

  <div class="sec-title">📊 Analyse de sensibilité — Prix d'achat</div>
  <div class="fs" style="padding:0;overflow:hidden">
    <table class="sens-tbl">
      <thead><tr><th>Prix d'achat</th><th>Rend. brut</th><th>Rend. net</th><th>CF mensuel</th><th>Négociation vs actuel</th></tr></thead>
      <tbody>
        ${[-30,-20,-15,-10,-5,0,5,10,15,20].map(delta => {
          const p2 = prix * (1 + delta/100);
          const tmp = JSON.parse(JSON.stringify(b));
          tmp.data.acq.prixAchat = p2;
          const cc = calcBien(tmp);
          const nego = -delta;
          return `<tr ${delta===0?'class="base-row"':''}>
            <td><strong>${fmt(p2)} €</strong></td>
            <td>${fmtD(cc.rendBrut)}%</td>
            <td>${fmtD(cc.rendNet)}%</td>
            <td class="${cc.cashflowMensuel>=0?'pos':'neg'}">${fmtE(Math.round(cc.cashflowMensuel))}</td>
            <td>${nego>0?`<span class="chip ch-g">−${nego}%</span>`:nego<0?`<span class="chip ch-r">+${Math.abs(nego)}%</span>`:'<span class="chip ch-b">Prix actuel</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <div class="sec-title" style="margin-top:18px">🎲 Scénarios</div>
  <div class="sc-grid">
    ${['pessimiste','realiste','optimiste'].map(type => {
      const sc = {pessimiste:scPess,realiste:scReal,optimiste:scOpti}[type];
      const icons = {pessimiste:'📉',realiste:'📊',optimiste:'📈'};
      const labels = {pessimiste:'Pessimiste',realiste:'Réaliste',optimiste:'Optimiste'};
      const ov = type === 'pessimiste'
        ? `${fmt(d.loc.loyerBas || Math.round((d.loc.loyer||0)*.85))}€ · ${d.loc.occBas||80}%`
        : type === 'optimiste'
        ? `${fmt(d.loc.loyerHaut || Math.round((d.loc.loyer||0)*1.1))}€ · ${d.loc.occHaut||98}%`
        : `${fmt(d.loc.loyer||0)}€ · ${d.loc.tauxOcc||92}%`;
      return `<div class="sc-card sc-${type} ${cs===type?'selected':''}" onclick="S.selectedScenario='${type}';save();renderDecision(getBien())">
        <div class="sc-title">${icons[type]} ${labels[type]} ${cs===type?'<span class="selected-badge">Actif</span>':''}</div>
        <div class="text-xs muted mb-8">${ov}</div>
        <div class="sc-cf ${sc.cashflowMensuel>=0?'pos':'neg'}">${fmtE(Math.round(sc.cashflowMensuel))}</div>
        <div class="text-xs muted">Rend. net ${fmtD(sc.rendNet)}% · Net-net ${fmtD(sc.rendNetNet)}%</div>
        <div class="text-xs muted">Score : ${sc.score}/100</div>
      </div>`;
    }).join('')}
  </div>

  <div class="sec-title">📍 Break-even</div>
  <div class="mg mg3">
    <div class="mc"><div class="mc-lbl">Loyer minimum autofinancement</div><div class="mc-val">${fmt(loyerMinBreak)} €/mois</div><div class="mc-sub">Pour CF = 0</div></div>
    <div class="mc"><div class="mc-lbl">Taux occupation minimum</div><div class="mc-val">${fmtD(occBreak)}%</div><div class="mc-sub">Pour ne pas perdre</div></div>
    <div class="mc ${c.cashflowNetNet > 0 ? 'mc-hl' : ''}"><div class="mc-lbl">Récupération de l'apport</div><div class="mc-val">${apportRecup}</div><div class="mc-sub">Via CF net-net cumulé</div></div>
  </div>`;

  recalcPrixCible();
}

function recalcPrixCible() {
  const b = getBien(); if (!b) return;
  const rendCible = parseFloat(document.getElementById('rendCible')?.value) || 6;
  const loyer = b.data.loc.loyer || 0;
  const tauxOcc = (b.data.loc.tauxOcc||92)/100;
  const loyerAn = loyer * 12 * tauxOcc;
  const chargesAn = (b.data.loc.taxeFonciere||0) + (b.data.loc.pno||0) + (b.data.loc.copro||0)*12;
  const revenus = loyerAn - chargesAn;
  const prixCible = revenus / (rendCible/100);
  const prix = b.data.acq.prixAchat || 0;
  const diff = prixCible - prix;
  const diffPct = prix > 0 ? (diff/prix*100) : 0;
  const el = document.getElementById('prixCibleResult'); if (!el) return;
  if (loyer === 0) { el.innerHTML = `<div class="muted text-sm">Renseignez d'abord un loyer dans Location.</div>`; return; }
  el.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div>
      <div class="text-xs muted mb-8">Prix cible pour ${rendCible}% de rendement net</div>
      <div class="price-big">${fmt(prixCible)} €</div>
      ${prix > 0 ? `<div class="mt-8 text-sm" style="color:${diff<0?'var(--success)':'var(--danger)'}">
        ${diff < 0 ? `✓ Prix actuel inférieur de ${fmt(Math.abs(diff))}€ (${fmtD(Math.abs(diffPct))}%) — objectif atteint` : `⚠ Négocier ${fmt(Math.abs(diff))}€ (${fmtD(Math.abs(diffPct))}%) pour atteindre l'objectif`}
      </div>` : ''}
    </div>
    <div>
      <div class="text-xs muted mb-8">Décomposition revenus nets</div>
      ${kv('Loyers bruts / an', fmt(loyerAn)+' €')}
      ${kv('Charges / an', '− '+fmt(chargesAn)+' €')}
      ${kv('Revenus nets', fmt(revenus)+' €', true)}
    </div>
  </div>`;
}

// PROJECTIONS
// ═══════════════════════════════════════════
function renderProjections(b) {
  const d = b.data;
  const sc = S.selectedScenario || 'realiste';
  const scenOverrides = {
    pessimiste: {loyer: d.loc.loyerBas || Math.round((d.loc.loyer||0)*.85), tauxOcc: d.loc.occBas||80},
    realiste: {loyer: d.loc.loyer||0, tauxOcc: d.loc.tauxOcc||92},
    optimiste: {loyer: d.loc.loyerHaut || Math.round((d.loc.loyer||0)*1.1), tauxOcc: d.loc.occHaut||98}
  };
  const ov = scenOverrides[sc];
  const revalo = (d.loc.revalo||1.5)/100;
  const nbAnnees = 25;
  const labels = [], cashflows = [], loyersData = [], valeurs = [];
  let loyer = ov.loyer * 12 * (ov.tauxOcc/100);
  let valeur = d.acq.prixAchat || 0;
  const calcBase = calcBien(b, ov);
  const creditAn = calcBase.creditAnnuel;
  const chargesAn = calcBase.chargesTotal;

  for (let a = 0; a <= nbAnnees; a++) {
    labels.push(new Date().getFullYear() + a);
    loyersData.push(Math.round(loyer));
    cashflows.push(Math.round((loyer - chargesAn - creditAn) / 12));
    valeurs.push(Math.round(valeur));
    loyer *= (1 + revalo);
    valeur *= 1.025;
  }

  const milestones = [1,5,10,15,20,25];
  const dark = S.dark;

  document.getElementById('mainContent').innerHTML = `
  <div class="flex items-c just-b mb-16">
    <div class="fw6">Scénario affiché :</div>
    <div class="flex gap-8">
      ${['pessimiste','realiste','optimiste'].map(t => `<button class="tab-btn ${sc===t?'active':''}" onclick="S.selectedScenario='${t}';save();renderProjections(getBien())">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
    </div>
  </div>
  <div class="cw">
    <div class="cw-title">Cash-flow mensuel projeté — scénario ${sc}</div>
    <div style="position:relative;height:220px"><canvas id="cCF" role="img" aria-label="Cash-flow projeté">Projection CF.</canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="cw">
      <div class="cw-title">Loyers bruts annuels projetés</div>
      <div style="position:relative;height:190px"><canvas id="cLoy" role="img" aria-label="Loyers projetés">Loyers.</canvas></div>
    </div>
    <div class="cw">
      <div class="cw-title">Valeur estimée du bien (+2.5%/an)</div>
      <div style="position:relative;height:190px"><canvas id="cVal" role="img" aria-label="Valeur projetée">Valeur.</canvas></div>
    </div>
  </div>
  <div class="fs">
    <div class="fs-title">📋 Données précises par année</div>
    <div class="tbl-scroll">
      <table class="proj-data">
        <thead><tr><th>Année</th><th>Cash-flow /mois</th><th>Loyers bruts /an</th><th>Valeur estimée</th><th>CF cumulé /an</th></tr></thead>
        <tbody>
          ${labels.map((yr, i) => {
            const cfCumul = cashflows.slice(0,i+1).reduce((s,v) => s+v*12, 0);
            return `<tr ${milestones.includes(i)?'class="yr-hl"':''}>
              <td><strong>${yr}</strong>${milestones.includes(i)?` <span class="chip ch-b">An ${i}</span>`:''}
</td>
              <td class="${cashflows[i]>=0?'pos':'neg'}"><strong>${fmtE(cashflows[i])}</strong></td>
              <td>${fmt(loyersData[i])} €</td>
              <td>${fmt(valeurs[i])} €</td>
              <td class="${cfCumul>=0?'pos':'neg'}">${fmtE(cfCumul)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  setTimeout(() => {
    const gridColor = dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.05)';
    const tickColor = dark ? '#6B6862' : '#9B9890';
    const opts = (title) => ({
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}€`}} },
      scales:{ x:{ticks:{color:tickColor,maxTicksLimit:8,font:{size:10}},grid:{color:gridColor}}, y:{ticks:{color:tickColor,callback:v=>fmt(v)+'€',font:{size:10}},grid:{color:gridColor}} }
    });
    const cf = document.getElementById('cCF');
    const loy = document.getElementById('cLoy');
    const val = document.getElementById('cVal');
    if (cf) new Chart(cf, {type:'bar',data:{labels,datasets:[{label:'CF mensuel',data:cashflows,backgroundColor:cashflows.map(v=>v>=0?'#3D6B4F55':'#C0392B55'),borderColor:cashflows.map(v=>v>=0?'#3D6B4F':'#C0392B'),borderWidth:1.5}]},options:opts('CF')});
    if (loy) new Chart(loy, {type:'line',data:{labels,datasets:[{label:'Loyers',data:loyersData,borderColor:'#C17B3E',backgroundColor:'#C17B3E22',tension:.4,fill:true,borderWidth:2,pointRadius:0}]},options:opts('Loyers')});
    if (val) new Chart(val, {type:'line',data:{labels,datasets:[{label:'Valeur',data:valeurs,borderColor:dark?'#A0A0A0':'#1A1916',backgroundColor:dark?'#A0A0A022':'#1A191622',tension:.4,fill:true,borderWidth:2,pointRadius:0}]},options:opts('Valeur')});

// ═══════════════════════════════════════════
// COMPARATEUR
// ═══════════════════════════════════════════
function renderCompare() {
  document.getElementById('tbTitle').textContent = 'Comparateur de biens';
  document.getElementById('tbActions').innerHTML = '';
  const allBiens = S.portfolios.flatMap(p => p.biens.map(b => ({b,p})));

  if (allBiens.length < 2) {
    document.getElementById('mainContent').innerHTML = `<div class="alert a-info">Ajoutez au moins 2 biens pour utiliser le comparateur.</div>`;
    return;
  }

  const items = allBiens.slice(0, 4);
  const calcs = items.map(({b}) => calcBien(b));

  // Trouver le meilleur sur chaque critère
  const bestRendBrut = Math.max(...calcs.map(c => c.rendBrut));
  const bestRendNet = Math.max(...calcs.map(c => c.rendNet));
  const bestRendNetNet = Math.max(...calcs.map(c => c.rendNetNet));
  const bestCF = Math.max(...calcs.map(c => c.cashflowMensuel));
  const bestCFnn = Math.max(...calcs.map(c => c.cashflowNetNet));
  const bestScore = Math.max(...calcs.map(c => c.score));

  // Score composite pour orientation
  const compositeScores = calcs.map((c, i) => {
    let pts = 0;
    if (c.rendBrut === bestRendBrut) pts += 1;
    if (c.rendNet === bestRendNet) pts += 2;
    if (c.rendNetNet === bestRendNetNet) pts += 2;
    if (c.cashflowMensuel === bestCF) pts += 2;
    if (c.cashflowNetNet === bestCFnn) pts += 2;
    if (c.score === bestScore) pts += 1;
    return {idx: i, pts, b: items[i].b, c};
  }).sort((a,b) => b.pts - a.pts);

  const winner = compositeScores[0];
  const winnerIdx = winner.idx;

  // Raisons du gagnant
  const reasons = [];
  const wc = calcs[winnerIdx];
  if (wc.rendNet === bestRendNet) reasons.push(`meilleur rendement net (${fmtD(wc.rendNet)}%)`);
  if (wc.cashflowMensuel === bestCF) reasons.push(`meilleur cash-flow (${fmtE(Math.round(wc.cashflowMensuel))})`);
  if (wc.rendNetNet === bestRendNetNet) reasons.push(`meilleure rentabilité après impôt (${fmtD(wc.rendNetNet)}%)`);
  if (wc.score === bestScore) reasons.push(`score le plus élevé (${wc.score}/100 — ${wc.scoreLabel})`);

  const cell = (val, isBest, isNeg=false) =>
    `<td style="${isBest?'font-weight:700;color:var(--success)':isNeg?'color:var(--danger)':''}">${val}${isBest?' ⭐':''}</td>`;

  const rows = [
    {label:"Prix d'achat", vals: calcs.map(c=>fmt(c.prixAchat)+' €'), best: null},
    {label:"Total investi", vals: calcs.map(c=>fmt(c.totalInvesti)+' €'), best: null},
    {label:"Apport", vals: calcs.map((c,i)=>fmt(items[i].b.data.acq.apport||0)+' €'), best: null},
    {label:"Mensualité crédit", vals: calcs.map(c=>fmt(c.mensualite)+' €/m'), best: null},
    {label:"Loyer mensuel", vals: calcs.map(c=>fmt(c.loyerMensuel)+' €/m'), bestVal: Math.max(...calcs.map(c=>c.loyerMensuel))},
    {label:"Rendement brut", vals: calcs.map(c=>fmtD(c.rendBrut)+'%'), bestVal: bestRendBrut},
    {label:"Rendement net", vals: calcs.map(c=>fmtD(c.rendNet)+'%'), bestVal: bestRendNet},
    {label:"Rendement net-net", vals: calcs.map(c=>fmtD(c.rendNetNet)+'%'), bestVal: bestRendNetNet},
    {label:"Cash-flow /mois", vals: calcs.map(c=>fmtE(Math.round(c.cashflowMensuel))), bestVal: bestCF, signed: true},
    {label:"CF net-net /mois", vals: calcs.map(c=>fmtE(Math.round(c.cashflowNetNet))), bestVal: bestCFnn, signed: true},
    {label:"Score /100", vals: calcs.map(c=>`${c.score}/100 — ${c.scoreLabel}`), bestVal: bestScore},
    {label:"Alertes", vals: calcs.map(c=>c.alerts.length > 0 ? c.alerts.map(a=>'• '+a.msg).join('<br>') : '✓ Aucune alerte'), best: null},
  ];

  document.getElementById('mainContent').innerHTML = `
  <div class="alert a-ok" style="font-size:13px">
    <strong>🏆 Recommandation : ${winner.b.nom}</strong><br>
    Ce bien se démarque sur ${reasons.length} critère(s) : ${reasons.join(', ')}.
    ${compositeScores.length > 1 ? `<br><span class="muted" style="font-size:11px">2ème : ${compositeScores[1].b.nom} · 3ème : ${compositeScores[2]?.b.nom || '—'}</span>` : ''}
  </div>
  <div class="sc-grid" style="grid-template-columns:repeat(${items.length},1fr);margin-bottom:18px">
    ${items.map(({b}, i) => {
      const c = calcs[i];
      const isWin = i === winnerIdx;
      return `<div class="mc ${isWin?'mc-hl':''}" style="${isWin?'border:2px solid var(--green)':''}">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <span style="font-size:16px">${typeIcon(b.type)}</span>
          <div>
            <div class="fw6" style="font-size:12px">${b.nom}${isWin?' 🏆':''}</div>
            <div class="text-xs muted">${b.ville||b.adresse||'—'}</div>
          </div>
        </div>
        <div class="mc-val ${c.cashflowMensuel>=0?'pos':'neg'}">${fmtE(Math.round(c.cashflowMensuel))}</div>
        <div class="mc-sub">Score : ${c.score}/100</div>
      </div>`;
    }).join('')}
  </div>
  <div class="fs" style="padding:0;overflow-x:auto">
    <table class="sens-tbl" style="min-width:500px">
      <thead><tr><th style="text-align:left">Critère</th>${items.map(({b},i)=>`<th ${i===winnerIdx?'style="color:var(--green)"':''}>${b.nom}${i===winnerIdx?' 🏆':''}</th>`).join('')}</tr></thead>
      <tbody>
        ${rows.map(row => `<tr>
          <td class="fw6" style="text-align:left">${row.label}</td>
          ${calcs.map((c,i) => {
            const isBest = row.bestVal !== undefined && parseFloat(row.vals[i]) === row.bestVal;
            const isNeg = row.signed && c[row.label] < 0;
            return `<td style="${i===winnerIdx?'font-weight:600':''}${isBest?';color:var(--success)':row.signed && calcs[i].cashflowMensuel < 0 && row.label.includes('Cash') ?';color:var(--danger)':''}">${row.vals[i]}${isBest?' ⭐':''}</td>`;
          }).join('')}
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  ${allBiens.length > 4 ? `<div class="alert a-info" style="margin-top:12px">Seuls les 4 premiers biens sont affichés. Vous avez ${allBiens.length} biens au total.</div>` : ''}`;
}

function getArtisanStats(artisanId) {
  const allTravaux = S.portfolios.flatMap(p =>
    p.biens.flatMap(b => [
      ...(b.data.travauxPC || []),
      ...(b.data.lots || []).flatMap(l => l.travaux || [])
    ])
  ).filter(t => t.artisanId === artisanId);
  return {
    total: allTravaux.length,
    valide: allTravaux.filter(t => t.valide).length,
    montant: allTravaux.reduce((s,t) => s + (parseFloat(t.reel || t.estime) || 0), 0),
    libelles: allTravaux.map(t => t.nom).filter(Boolean)
  };
}

function saveArtisan() {
  const id = document.getElementById('moArtisanId').value;
  const data = {
    id: id || uid(),
    nom: document.getElementById('a-nom').value.trim(),
    specialite: document.getElementById('a-specialite').value,
    telephone: document.getElementById('a-tel').value.trim(),
    email: document.getElementById('a-email').value.trim(),
    siret: document.getElementById('a-siret').value.trim(),
    adresse: document.getElementById('a-adresse').value.trim(),
    notes: document.getElementById('a-notes').value.trim(),
    createdAt: Date.now()
  };
  if (!data.nom) return;
  if (!S.artisans) S.artisans = [];
  if (id) {
    const idx = S.artisans.findIndex(a => a.id === id);
    if (idx !== -1) S.artisans[idx] = data;
  } else {
    S.artisans.push(data);
  }
  save();
  document.getElementById('moArtisan').classList.remove('open');
  renderArtisans();
}

function deleteArtisan(id) {
  if (!confirm('Supprimer cet artisan ?')) return;
  S.artisans = S.artisans.filter(a => a.id !== id);
  save();
  document.getElementById('moArtisan').classList.remove('open');
  renderArtisans();
}

function parseAnnonce(text) {
  const t = text.replace(/\s+/g, ' ').trim();

  // ── Prix ──
  let prix = null;
  const prixMatches = [...t.matchAll(/(\d[\d\s]{2,8})\s*€/g)];
  for (const m of prixMatches) {
    const n = parseInt(m[1].replace(/\s/g,''));
    if (n > 10000 && n < 50000000) { prix = n; break; }
  }

  // ── Surface totale ──
  let surface = null;
  const surfMatches = [...t.matchAll(/(\d+(?:[.,]\d+)?)\s*m[²2]/gi)];
  for (const m of surfMatches) {
    const n = parseFloat(m[1].replace(',','.'));
    if (n > 20 && n < 10000) { surface = n; break; }
  }

  // ── Type ──
  let type = 'appartement';
  if (/immeuble\s*(de rapport|entier|complet|en mono)/i.test(t)) type = 'immeuble';
  else if (/\bmaison\b/i.test(t)) type = 'maison';
  else if (/local\s*(commercial|professionnel)/i.test(t)) type = 'local';
  else if (/terrain/i.test(t)) type = 'terrain';

  // ── Nb pièces ──
  let nbPieces = null;
  const piecesM = t.match(/(\d+)\s*pièces?/i) || t.match(/\bT(\d)\b/i) || t.match(/F(\d)\b/i);
  if (piecesM) nbPieces = parseInt(piecesM[1]);

  // ── Ville & CP ──
  let ville = '', cp = '';
  const cpM = t.match(/\b(0[1-9]|[1-8]\d|9[0-5])\d{3}\b/);
  if (cpM) {
    cp = cpM[0];
    const ctx = t.slice(Math.max(0, cpM.index - 80), cpM.index + 80);
    const cityM = ctx.match(/([A-ZÉÈÊËÀÂÎÏÔÙÛÜ][a-zéèêëàâîïôùûü\-]+(?:\s[A-ZÉÈÊËÀÂÎÏÔÙÛÜ][a-zéèêëàâîïôùûü\-]+)*)\s*[\(,]?\s*(?:0[1-9]|[1-8]\d|9[0-5])\d{3}/);
    if (cityM) ville = cityM[1].trim();
    if (!ville) {
      const cityM2 = ctx.match(/(?:0[1-9]|[1-8]\d|9[0-5])\d{3}\s*[·•\-]?\s*([A-ZÉÈÊËÀÂÎÏÔÙÛÜ][a-zéèêëàâîïôùûü\-]+(?:\s[A-ZÉÈÊËÀÂÎÏÔÙÛÜ][a-zéèêëàâîïôùûü\-]+)*)/);
      if (cityM2) ville = cityM2[1].trim();
    }
  }
  // Also try "city CP" or "city (CP)" patterns
  if (!ville) {
    const bigCities = ['Paris','Lyon','Marseille','Toulouse','Nice','Nantes','Strasbourg',
      'Montpellier','Bordeaux','Lille','Rennes','Reims','Le Havre','Saint-Étienne','Toulon',
      'Grenoble','Dijon','Angers','Nîmes','Clermont-Ferrand','Tours','Limoges','Amiens'];
    for (const c of bigCities) {
      if (new RegExp('\\b' + c.replace('-','[\\-\\s]') + '\\b','i').test(t)) { ville=c; break; }
    }
  }

  // ── Adresse ──
  let adresse = '';
  const adrM = t.match(/(\d+[,\s]+(?:rue|avenue|boulevard|av\.|bd\.?|impasse|allée|place|chemin|voie|route|cours)[^\n,\.]{3,50})/i);
  if (adrM) adresse = adrM[1].trim().slice(0,60);

  // ── Année ──
  let anneeConstr = null;
  const anneeM = t.match(/(?:construit|construction|bâti)\D{0,20}(1[89]\d{2}|20[012]\d)/i)
    || t.match(/\b(19[3-9]\d|20[012]\d)\b/);
  if (anneeM) { const yr=parseInt(anneeM[1]); if(yr>=1850&&yr<=2030) anneeConstr=yr; }

  // ── Charges ──
  let charges = null;
  const chargesM = t.match(/(\d+)\s*€?\s*de\s*charges?\s*(?:par\s*logement|\/\s*logement)/i)
    || t.match(/charges?\s*[:\-]?\s*(\d+(?:[.,]\d+)?)\s*€?\s*(?:\/\s*mois|mensuel)/i)
    || t.match(/(\d+)\s*€\s*(?:de\s*)?charges?\s*(?:\/\s*mois)?/i);
  if (chargesM) charges = parseFloat(chargesM[1].replace(',','.'));

  // ── Taxe foncière ──
  let taxeFonciere = null;
  const tfM = t.match(/taxe\s*fonci[eè]re\s*[:\-]?\s*(\d+(?:\s\d+)*)\s*€/i)
    || t.match(/(\d+(?:\s\d+)*)\s*€\s*(?:de\s*)?taxe\s*fonci[eè]re/i);
  if (tfM) taxeFonciere = parseInt(tfM[1].replace(/\s/g,''));

  // ── Loyer global ──
  let loyerGlobal = null;
  const loyerRevM = t.match(/revenus?\s*locatifs?\s*(?:actuels?)?\s*[:\-]?\s*(?:environ\s*)?(\d+[\s\d]*)\s*€/i)
    || t.match(/loyers?\s*(?:annuels?)?\s*[:\-]?\s*(\d+[\s\d]*)\s*€/i);
  if (loyerRevM) {
    const n = parseInt(loyerRevM[1].replace(/\s/g,''));
    // If annual, convert to monthly
    if (n > 5000) loyerGlobal = Math.round(n / 12);
    else loyerGlobal = n;
  }

  // ── DPE ──
  let dpe = 'Non précisé';
  const dpeM = t.match(/(?:classe\s*[éeE]nergie|DPE|consommation)[^\w]*([A-G])\b/i)
    || t.match(/\bDPE\s*[:\-]?\s*([A-G])\b/i);
  if (dpeM) dpe = dpeM[1].toUpperCase();

  // ── Chauffage ──
  let chauffage = '';
  if (/individuel/i.test(t)) chauffage = 'Individuel';
  else if (/collectif/i.test(t)) chauffage = 'Collectif';
  const modeChauffM = t.match(/(?:mode\s*de\s*)?chauffage\s*[:\-]?\s*([\w\s]+?)(?:\n|,|\.|$)/i);
  if (modeChauffM) chauffage += (chauffage ? ' — ' : '') + modeChauffM[1].trim().slice(0,20);

  // ── Ascenseur ──
  const hasAscenseur = /ascenseur\s*[:\-]?\s*oui/i.test(t);

  // ══════════════════════════════════════════════════════
  // PARSING DES LOTS — le coeur de la nouveauté
  // ══════════════════════════════════════════════════════
  const lots = parseLots(t, charges || 0);

  // ── Nom auto ──
  const parts = [];
  if (type === 'immeuble') parts.push('Immeuble');
  else if (type === 'maison') parts.push('Maison');
  else if (nbPieces) parts.push(`T${nbPieces}`);
  if (surface) parts.push(`${surface}m²`);
  if (ville) parts.push(ville);
  const nom = parts.join(' ') || 'Bien importé';

  const description = t.slice(0, 400).replace(/<[^>]+>/g,'');

  return { nom, type, surface, nbPieces, prix, adresse, ville, cp,
           anneeConstr, charges, taxeFonciere, loyer: loyerGlobal,
           dpe, chauffage, hasAscenseur, lots, description };
}

function parseLots(text, chargesParLot = 0) {
  const lots = [];
  const t = text;

  // Strategy: find patterns like "T2 de 33m² loué 430€/mois" or "studio de 25m2 loué pour 360€"
  // Also: "local commercial d'environ 77m² loué pour 680€/mois"
  // And: "studio de 25m² et 40m2 au sol actuellement loué 370€ et 380€"

  // Pattern 1: explicit lot descriptions with type + surface + loyer
  // Matches: "T2 de 33m² loué 430€", "studio 25m2 loué 362€", "local commercial 77m² loué 680€"
  const lotPattern = /(?:(local\s*commercial|studio|T\d|appartement\s*T?\d*|F\d)(?:\s*(?:de|d'environ|d'|anciennement\s+loué\s+pour|loué\s+pour|au\s+sol))?\s*(?:d'environ\s+)?(\d+(?:[.,]\d+)?)\s*m[²2](?:\s*(?:carrez?|carré|au\s+sol))?\s*(?:et\s+\d+m[²2][^\d]*)?(?:actuellement\s+)?(?:anciennement\s+)?lou[eé](?:\s+pour)?\s*(?:un\s+montant\s+de\s+)?(\d+)\s*€(?:\s*(?:\/|par)\s*mois)?)/gi;

  let m;
  while ((m = lotPattern.exec(t)) !== null) {
    const typeRaw = m[1].toLowerCase().trim();
    const surfVal = parseFloat(m[2].replace(',','.'));
    const loyerVal = parseInt(m[3]);

    let lotType = 'T2';
    if (/studio/i.test(typeRaw)) lotType = 'Studio';
    else if (/local\s*commercial/i.test(typeRaw)) lotType = 'Commercial';
    else if (/T(\d)/i.test(typeRaw)) lotType = 'T' + typeRaw.match(/(\d)/)[1];
    else if (/F(\d)/i.test(typeRaw)) lotType = 'T' + typeRaw.match(/(\d)/)[1];

    if (surfVal > 5 && surfVal < 500 && loyerVal > 50 && loyerVal < 10000) {
      lots.push({
        type: lotType,
        surface: surfVal,
        loyer: loyerVal,
        charges: chargesParLot,
        statut: /anciennement/i.test(m[0]) ? 'vacant' : 'loue',
        nom: `${lotType} ${surfVal}m²`
      });
    }
  }

  // Pattern 2: "deux studios de 25m² actuellement loués 370€ et 380€/mois"
  // Handle "deux X de Ym² loués A€ et B€"
  const doublePattern = /deux\s+(studios?|T\d|appartements?)\s+(?:de\s+)?(\d+(?:[.,]\d+)?)\s*m[²2][^€]{0,50}?(\d{3,4})\s*€\s*et\s*(\d{3,4})\s*€/gi;
  while ((m = doublePattern.exec(t)) !== null) {
    const typeRaw = m[1].toLowerCase();
    const surfVal = parseFloat(m[2].replace(',','.'));
    const loyer1 = parseInt(m[3]);
    const loyer2 = parseInt(m[4]);
    let lotType = /studio/i.test(typeRaw) ? 'Studio' : 'T2';
    if (surfVal > 5 && surfVal < 500) {
      [loyer1, loyer2].forEach(l => {
        if (l > 50 && l < 10000 && !lots.some(lot => lot.loyer === l && lot.surface === surfVal)) {
          lots.push({ type: lotType, surface: surfVal, loyer: l, charges: chargesParLot,
                      statut: 'loue', nom: `${lotType} ${surfVal}m²` });
        }
      });
    }
  }

  // Deduplicate lots that are too similar (same type+surface+loyer)
  const unique = [];
  for (const lot of lots) {
    const isDup = unique.some(u => u.type===lot.type && u.surface===lot.surface && u.loyer===lot.loyer);
    if (!isDup) unique.push(lot);
  }

  // Auto-name with index
  unique.forEach((lot, i) => { lot.nom = `${lot.type} ${lot.surface}m² — Lot ${i+1}`; });

  return unique;
}


function getFieldVal(key, type = 'text') {
  const el = document.getElementById('af-' + key);
  if (!el) return null;
  if (type === 'number') return parseFloat(el.value) || 0;
  return el.value.trim();
}

function importerAnnonce() {
  const pfTarget = document.getElementById('annoncePfTarget').value;
  const nom = getFieldVal('nom') || 'Bien importé';
  const type = getFieldVal('type') || 'appartement';
  const prix = getFieldVal('prix', 'number');
  const surface = getFieldVal('surface', 'number');
  const adresse = getFieldVal('adresse');
  const ville = getFieldVal('ville');
  const cp = getFieldVal('cp');
  const anneeConstr = getFieldVal('anneeConstr', 'number');
  const charges = getFieldVal('charges', 'number');
  const taxeFonciere = getFieldVal('taxeFonciere', 'number');
  const loyer = getFieldVal('loyer', 'number');
  const dpe = getFieldVal('dpe');
  const etage = getFieldVal('etage');
  const notes = `DPE: ${dpe} | Étage: ${etage || '—'} | ` + getFieldVal('notes');

  if (pfTarget === 'new') {
    // Create a new portfolio (immeuble) with this data
    const pf = {
      id: uid(), name: nom, type, adresse, ville, cp,
      surface, prixAchat: prix,
      strategie: 'LMNP', statut: 'prospect',
      desc: notes, biens: [], createdAt: Date.now()
    };
    // Store acquisition info at portfolio level
    pf.prixAchat = prix;
    pf.fraisNotaire = 7.5;
    pf.apport = 0;
    pf.empruntMontant = Math.round(prix * 0.85);
    S.portfolios.push(pf);
    S.openPids[pf.id] = true;
    pf.lienAnnonce = getFieldVal('lienAnnonce');
    S.activePid = pf.id;
    S.activeBid = null;
    S.activeTab = 'synthese';

    // Create lots from parsed data
    if (!pf.data) pf.data = defaultData(type);
    if (!pf.data.lots) pf.data.lots = [];

    if (_annonceData.lots && _annonceData.lots.length > 0) {
      // Use detected lots
      _annonceData.lots.forEach((lotDef, i) => {
        const lot = {
          id: uid(), nom: lotDef.nom || `Lot ${i+1}`,
          type: lotDef.type || 'T2',
          surface: lotDef.surface || 0,
          loyer: lotDef.loyer || 0,
          charges: lotDef.charges || 0,
          statut: lotDef.statut || 'vacant',
          locataire: '', dateEntree: '', depotGarantie: 0,
          loyerApresTravaux: 0, notes: '', travaux: [], _open: false
        };
        pf.data.lots.push(lot);
        pf.biens.push(lot);
      });
    } else if (type !== 'immeuble') {
      // Single lot
      const lot = {
        id: uid(), nom: nom, type: `T${getFieldVal('nbPieces','number') || 2}`,
        surface, loyer: loyer || 0, charges: charges || 0,
        statut: loyer > 0 ? 'loue' : 'vacant',
        locataire: '', dateEntree: '', depotGarantie: 0,
        loyerApresTravaux: 0, notes, travaux: [], _open: false
      };
      pf.data.lots.push(lot);
      pf.biens.push(lot);
    }

  } else {
    // Add as a lot to existing portfolio
    const pf = S.portfolios.find(p => p.id === pfTarget);
    if (!pf) return;
    if (!pf.data) pf.data = defaultData(pf.type || 'immeuble');
    if (!pf.data.lots) pf.data.lots = [];
    if (_annonceData.lots && _annonceData.lots.length > 0) {
      _annonceData.lots.forEach((lotDef, i) => {
        const lot = {
          id: uid(), nom: lotDef.nom || `Lot ${i+1}`,
          type: lotDef.type || 'T2', surface: lotDef.surface || 0,
          loyer: lotDef.loyer || 0, charges: lotDef.charges || 0,
          statut: lotDef.statut || 'vacant',
          locataire: '', dateEntree: '', depotGarantie: 0,
          loyerApresTravaux: 0, notes: '', travaux: [], _open: false
        };
        pf.data.lots.push(lot); pf.biens.push(lot);
      });
      S.activePid = pf.id; S.activeBid = null; S.activeTab = 'synthese';
    } else {
      const lot = {
        id: uid(), nom, type, surface,
        loyer: loyer || 0, charges: charges || 0,
        statut: loyer > 0 ? 'loue' : 'vacant',
        locataire: '', dateEntree: '', depotGarantie: 0,
        loyerApresTravaux: 0, notes, travaux: [], _open: false,
        data: defaultData(type)
      };
      if (lot.data) { lot.data.acq.prixAchat = prix; lot.data.loc.loyer = loyer || 0; }
      pf.biens.push(lot);
      S.activePid = pf.id; S.activeBid = lot.id; S.activeTab = 'synthese';
    }
  }

  save();
  _annonceData = {};
  // Reset modal for next use
  const at = document.getElementById('annonceText');
  if (at) at.value = '';
  document.getElementById('annonceResult').style.display = 'none';
  const lp = document.getElementById('annonceLotsPreview');
  if (lp) { lp.style.display = 'none'; lp.innerHTML = ''; }
  closeMo('moImportAnnonce');
  render();

  // Show success
  setTimeout(() => {
    const el = document.getElementById('mainContent');
    if (el) {
      const banner = document.createElement('div');
      banner.className = 'alert a-ok';
      banner.style.cssText = 'position:fixed;top:60px;right:20px;z-index:999;min-width:300px;box-shadow:var(--shmd)';
      banner.innerHTML = `✅ <strong>${nom}</strong> importé avec succès !<br><span class="text-xs muted">Vérifiez et complétez les données manquantes.</span>`;
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 4000);
    }
  }, 300);
}

function editLienAnnonce(pfId) {
  const lien = prompt('Colle le lien de l\'annonce :');
  if (lien === null) return;
  const pf = S.portfolios.find(p => p.id === pfId);
  if (pf) { pf.lienAnnonce = lien.trim(); save(); render(); }
}
